name: brainrot
description: "A new Flutter project."

publish_to: 'none' 

version: 1.0.0+1

environment:
  sdk: ^3.7.0

dependencies:
  flutter:
    sdk: flutter

  # State Management
  provider: ^6.1.2
  
  # UI Components
  cupertino_icons: ^1.0.8
  #images
  flutter_svg: ^2.2.1
  # HTTP Requests
  http: ^1.2.1
  dio: ^5.4.1
  
  # Local Storage
  shared_preferences: ^2.2.2
  
  # Navigation
  go_router: ^13.2.0
  
  # JSON Serialization
  json_annotation: ^4.8.1
  
  # Utilities
  equatable: ^2.0.5
  uuid: ^4.3.3

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.13.1



flutter_launcher_icons:
  android: true
  ios: true
  web:
    generate: true
  image_path: "assets/images/logo1.png"
  min_sdk_android: 21

flutter:
  uses-material-design: true
  assets:
    - assets/images/
